# The Site Configuration

theme: jekyll-theme-chirpy

lang: en
timezone: Asia/Bangkok

title: Wattana's Blog
tagline: Just another blog.
description: >-
  Just another blog.

url: "https://wattanar.github.io"

github:
  username: wattanar

social:
  name: Wattana Ruengmucha
  email: wattana.ruengmucha@gmail.com
  links:
    - https://github.com/wattanar

avatar: https://avatars.githubusercontent.com/u/5792025?v=4

theme_mode: dark

toc: true

analytics:
  google:
    id: UA-176574768-1

comments:
  provider:

pageviews:
  provider:

paginate: 10
baseurl: ""

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - "package*.json"
  - MIGRATION-SPEC.md

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
